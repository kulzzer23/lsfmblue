<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" type="image/x-icon" href="./src/favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./src/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./src/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./src/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="./src/favicon/site.webmanifest" />
  <title>Админ-панель: Экзамены и обучение</title>
  <link rel="stylesheet" href="styles.css"> <style>
    /* Немного стилей чисто для админки */
    .admin-container { max-width: 800px; margin: 40px auto; padding: 20px; }
    .question-editor { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(127, 227, 255, 0.2); }
    .editor-row { margin-bottom: 15px; display: flex; flex-direction: column; }
    .editor-row input, .editor-row textarea { background: #0b1426; color: #fff; border: 1px solid #334; padding: 10px; border-radius: 6px; }
    .save-btn { background: #2ecc71; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; }
    .danger-btn { background: #ef4444; color: #fff; padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; }
    .tab-bar { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    .tab-btn { background: rgba(255,255,255,0.08); color: #e2e8f0; border: 1px solid rgba(127,227,255,0.15); padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: rgba(127,227,255,0.18); color: #fff; border-color: rgba(127,227,255,0.35); }
    .notice-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(127,227,255,0.15); padding: 14px 16px; border-radius: 10px; color: #cbd5e1; margin-bottom: 18px; }
    .learning-editor-shell { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 16px; align-items: start; }
    .learning-editor-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .learning-editor-panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(127, 227, 255, 0.15); border-radius: 14px; padding: 16px; }
    .learning-editor-panel h3, .learning-editor-panel h4 { margin-top: 0; }
    .learning-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .learning-field label { color: #cbd5e1; font-weight: 600; font-size: 0.95rem; }
    .learning-field input, .learning-field textarea, .learning-field select {
      background: #0b1426;
      color: #fff;
      border: 1px solid #334;
      padding: 10px 12px;
      border-radius: 8px;
      font: inherit;
    }
    .learning-field textarea { min-height: 88px; resize: vertical; }
    .learning-section-card-editor { border: 1px solid rgba(127, 227, 255, 0.12); border-radius: 14px; padding: 14px; margin-bottom: 14px; background: rgba(11, 20, 38, 0.55); }
    .learning-section-actions, .learning-subsection-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .learning-mini-btn { background: rgba(127, 227, 255, 0.12); color: #e2e8f0; border: 1px solid rgba(127, 227, 255, 0.2); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .learning-mini-btn.danger { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.35); }
    .learning-preview { background: linear-gradient(180deg, rgba(15,23,42,.9), rgba(2,6,23,.95)); border-radius: 14px; border: 1px solid rgba(127, 227, 255, 0.14); padding: 18px; position: sticky; top: 16px; }
    .learning-preview .preview-box { background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); padding: 14px; margin-bottom: 12px; }
    .learning-preview .preview-section { padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .learning-preview .preview-subsection { margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.08); }
    .learning-preview small { color: #94a3b8; }
    @media (max-width: 1100px) {
      .learning-editor-shell { grid-template-columns: 1fr; }
      .learning-preview { position: static; }
    }
  </style>
</head>
<body>
    <div id="admin-auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070d1c; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
  <h2 style="color: #fff; margin: 0; font-family: sans-serif;">Вход в админ-панель</h2>
  <input type="password" id="admin-password-input" placeholder="Введите пароль" style="background: #0b1426; color: #fff; border: 1px solid #334; padding: 12px; border-radius: 6px; width: 260px; text-align: center; font-size: 1.1rem; outline: none;">
  <button id="admin-auth-btn" class="primary-button" style="padding: 10px 40px; font-size: 1rem;">Войти</button>
</div>
  <div class="admin-container">
    <h1 style="color: #7fe3ff;">Управление вопросами</h1>
    <div class="notice-box">
      Здесь можно редактировать и экзамены, и раздел обучения. Изменения в обучении сохраняются в браузере как оверрайд поверх <code>src/content.js</code>.
    </div>
    <div class="tab-bar">
      <button id="admin-tab-exams" class="tab-btn active" type="button">Экзамены</button>
      <button id="admin-tab-learning" class="tab-btn" type="button">Обучение</button>
    </div>
    <div id="admin-exams-actions">
      <button id="add-new-btn" class="primary-button" style="margin-bottom: 20px;">+ Добавить новый вопрос</button>
    </div>
    <div id="admin-learning-actions" style="display:none; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;">
      <button id="save-learning-btn" class="save-btn" type="button">Сохранить обучение</button>
      <button id="reset-learning-btn" class="danger-btn" type="button">Сбросить к src/content.js</button>
    </div>
    
    <div id="admin-questions-list">
      <p>Загрузка вопросов из базы...</p>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
